name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: kurodot-agent

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP (direct SA key activation) ───────────────────
      - name: Authenticate to GCP
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" | base64 --decode > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json
          gcloud config set project "${{ secrets.GCP_PROJECT_ID }}"
          gcloud auth configure-docker --quiet
          rm -f /tmp/sa-key.json

      # ── 3. Build container via Cloud Build ──────────────────────────────────
      - name: Build & push Docker image (Cloud Build)
        run: |
          gcloud builds submit \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --timeout=600s

      # ── 4. Deploy to Cloud Run ───────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --quiet

      # ── 5. Print live URL ────────────────────────────────────────────────────
      - name: Show deployed URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
