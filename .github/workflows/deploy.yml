name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: kurodot-agent

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to GCP
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "$GCP_SA_KEY" | base64 --decode > "$RUNNER_TEMP/gcp-key.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/gcp-key.json"
          gcloud config set project "$GCP_PROJECT_ID"
          gcloud auth configure-docker --quiet

      - name: Build & push Docker image
        run: |
          gcloud builds submit \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --timeout=600s

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --update-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --quiet

      - name: Show deployed URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
