name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: kurodot-agent

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
        # ── 2. Install gcloud CLI ────────────────────────────────────────────────
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ── 3. Install gcloud CLI ────────────────────────────────────────────────
        # ── 3. Authenticate to GCP via base64-encoded service account key ──────
        - name: Authenticate to GCP
          env:
            GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          run: |
            echo "$GCP_SA_KEY" | base64 --decode > "$RUNNER_TEMP/gcp-key.json"
            gcloud auth activate-service-account --key-file="$RUNNER_TEMP/gcp-key.json"
            gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
            gcloud auth configure-docker --quiet

        # ── 4. Build container via Cloud Build ──────────────────────────────────
      - name: Configure gcloud project
        run: gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      # ── 5. Build container via Cloud Build ──────────────────────────────────
      - name: Build & push Docker image (Cloud Build)
        run: |
          gcloud builds submit \
        # ── 5. Deploy to Cloud Run ───────────────────────────────────────────────
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --timeout=600s

      # ── 6. Deploy to Cloud Run ───────────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
        # ── 6. Print live URL ────────────────────────────────────────────────────
            --update-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --quiet

      # ── 7. Print live URL ────────────────────────────────────────────────────
      - name: Show deployed URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
