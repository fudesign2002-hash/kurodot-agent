            function createStickyFromRecommendation(selectedInsightObj) {
                    const canvasBoard = document.body; // Create note on the main body
                    let targetX = window.innerWidth / 2;
                    let targetY = window.innerHeight / 2;
                    
                    const canvas = document.getElementById('banner-artboard');
                    if (canvas) {
                        const rect = canvas.getBoundingClientRect();
                        targetX = rect.left + 50; // Place on the left side of banner
                        targetY = rect.top + 50;
                    }
                    
                    const pos = getSafePosition(targetX, targetY);

                    // --- MATCH UI COLOR TO THE ORIGINATING AGENT (UPDATED PER README) ---
                    const targetRole = selectedInsightObj.role || 'analyst';
                    const roleColors = {
                        'analyst': { name: 'ANALYST', color: '#5062c8' },
                        'vi': { name: 'VI DESIGNER', color: '#ce538a' }, // PINK from README
                        'editor': { name: 'EDITORIAL', color: '#6bcdcf' }, // TEAL from README
                        'pm': { name: 'PROJECT MANAGER', color: '#f1a456' }, // ORANGE from README
                        'tech': { name: 'TECH PRODUCER', color: '#272a3a' } // DARK from README
                    };
                    const agentConfig = roleColors[targetRole] || roleColors['analyst'];
                    
                    const newNote = document.createElement('div');
                    newNote.className = `sticky-note animate-in light-theme role-${targetRole}`;
                    newNote.style.backgroundColor = '#fefefe';
                    newNote.style.left = `${pos.x}px`;
                    newNote.style.top = `${pos.y}px`;
                    newNote.style.zIndex = ++zIndexCounter;
                    newNote.dataset.recommendationId = selectedInsightObj.id; 

                    newNote.innerHTML = `
                        <div class="note-header" style="cursor: move;">
                            <span class="delete-btn">✕</span>
                        </div>
                        <div style="font-size: 9px; color: ${agentConfig.color}; font-weight: 800; margin-bottom: 8px; letter-spacing: 1px;">
                            ${agentConfig.name} RECOMMENDATION
                        </div>
                        <div class="note-content" contenteditable="true">${selectedInsightObj.text}</div>
                        <div class="note-footer" style="display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 15px;">
                            <button class="dismiss-btn" style="background: none; border: 1px solid #ddd; border-radius: 4px; font-size: 10px; padding: 4px 10px; cursor: pointer; color: #888; transition: all 0.2s;">Dismiss</button>
                            <button class="apply-btn" style="background: ${agentConfig.color}; border: none; border-radius: 4px; font-size: 10px; padding: 4px 12px; cursor: pointer; color: white; font-weight: 700; transition: all 0.2s;">Apply</button>
                        </div>
                    `;
                    
                    canvasBoard.appendChild(newNote);
                    makeDraggable(newNote);

                    // 綁定 Apply 按鈕
                    newNote.querySelector('.apply-btn').addEventListener('click', async () => {
                        const text = newNote.querySelector('.note-content').innerText.trim();
                        
                        // 立即移除 Apply/Dismiss 按鈕，防止重複點擊
                        const footer = newNote.querySelector('.note-footer');
                        if (footer) footer.remove();
                        
                        const recId = newNote.dataset.recommendationId;
                        if (recId && !window._appliedRecommendations.includes(recId)) {
                            window._appliedRecommendations.push(recId);
                        }

                        // PM acknowledges every Apply before dispatching to the right agent
                        const sessionId = 'sess_' + Date.now();
                        showAgentConsoleMessage('color-pm', `PM: Received recommendation — reviewing & dispatching...`, 2000, 30, '📋');
                        const pmDot = document.querySelector('.color-pm');
                        if (pmDot) {
                            pmDot.classList.replace('state-idle', 'state-executing');
                            pmDot.classList.replace('state-completed', 'state-executing');
                        }

                        // --- FIX: Route by recId directly to avoid PM restarting full pipeline ---
                        // --- 特殊連動：Analyst 建議被 Apply 後，觸發 Designer 建議 ---
                        if (recId === 'ratio_4_5_dark') {
                            await openPMSession(sessionId, ['vi']);
                            showAgentConsoleMessage('color-pm', `PM: Dispatching layout update to VI Designer...`, 2000, 20);
                            triggerRevision('VI Designer', text, newNote, { sessionId });
                            console.log("%c[SYSTEM]%c Analyst suggestion applied. Triggering Designer follow-up in 5s.", "color: #5062c8; font-weight:bold;");
                            const analystDot = document.querySelector('.color-analyst');
                            if (analystDot) {
                                analystDot.classList.remove('active');
                                analystDot.innerHTML = '';
                            }
                            setTimeout(() => {
                                if (typeof triggerProactiveInsight === 'function') {
                                    triggerProactiveInsight();
                                }
                            }, 5000);

                        // --- 特殊連動：Designer 建議被 Apply 後 ---
                        } else if (recId === 'full_background') {
                            await openPMSession(sessionId, ['vi']);

        function makeDraggableResult(element, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            handle.onmousedown = dragMouseDown;
            function dragMouseDown(e) {
                if(e.target.classList.contains('close-btn')) return;
                e.preventDefault();
                zIndexCounter += 10;
                element.style.zIndex = zIndexCounter;
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }
            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px";
                element.style.left = (element.offsetLeft - pos1) + "px";
            }
            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

                        }
                        if (extra && extra.sessionId && !extra._designerDoneReported) {
                            extra._designerDoneReported = true;
                            reportAgentDone(extra.sessionId, 'vi');
                        }
                        // NOTE: chain triggerProactiveInsight is handled by the Apply button handler.
                        // Do NOT call it here — doing so would double-fire the next recommendation log.
                    }

                    if (imgBg) {
                        // Avoid constantly changing image colors randomly on every click
                        // Only change hue if explicitly asked, otherwise preserve original
                        if (instructions.includes('filter') || instructions.includes('濾鏡') || instructions.includes('color swap')) {
                            const randomHue = Math.floor(Math.random() * 360);
                            imgBg.style.filter = `hue-rotate(${randomHue}deg) contrast(1.3) saturate(1.1)`;
                            console.log("%c[VI DESIGNER ACTION]%c Applied random hue filter.", "color: #388E3C; font-weight:bold;", "color:#333");
                        } else {
                            // Clear filters if simply redefining layout
                            imgBg.style.filter = "contrast(1.05) saturate(1.05)";
                        }
                    }

                    // --- GLOBAL DESIGNER COMPLETION (Outside specific layout blocks) ---
                    if (dot) dot.classList.replace('state-executing', 'state-completed');
                    if (noteElement) {
                        console.log("%c[VI DESIGNER]%c Final completion fallback triggered.", "color: #388E3C; font-weight:bold;", "color:#555");
                        markNoteCompleted(noteElement);
                    }
                    if (extra && extra.sessionId && !extra._designerDoneReported) {
                        extra._designerDoneReported = true;
                        reportAgentDone(extra.sessionId, 'vi');
                    }
                }, 1500);
            }
            // 3) Tech Producer logic (Export/Print/Clipboard)
            else if (role.includes('Producer') || role.toLowerCase().includes('tech')) {
                const isJPG  = instructions.toLowerCase().includes('jpg') || instructions.toLowerCase().includes('jpeg');
                const isPNG  = instructions.toLowerCase().includes('png');
                const isPDF  = instructions.toLowerCase().includes('pdf');
                const isEnd  = instructions.toLowerCase().includes('end');
                const isCopy = instructions.toLowerCase().includes('copy') || instructions.toLowerCase().includes('clipboard');
                
                let formatLabel = isPNG ? 'PNG' : (isPDF ? 'PDF' : (isCopy ? 'Clipboard' : 'JPG'));
                if (isEnd && !isPNG && !isPDF && !isCopy) formatLabel = 'JPG';

                if (isCopy) {
                    showAgentConsoleMessage(`color-${roleShort}`, `Tech: Copying layout snapshot to clipboard...`, 3000, 20, '📋');
                } else {
                    showAgentConsoleMessage(`color-${roleShort}`, `Tech: Processing final "${formatLabel}" export request...`, 3000, 20, '💾');
                }
                setTimeout(() => {
                    const artboard = document.getElementById('banner-artboard');
                    if (!artboard) {
                        showAgentConsoleMessage(`color-${roleShort}`, `⚠️ No layout found to export.`, 3000, 20);
                        if(dot) dot.classList.replace('state-executing', 'state-completed');
                        markNoteCompleted(noteElement);
                        return;
                    }

                    const finalize = () => {
                        if(dot) dot.classList.replace('state-executing', 'state-completed');
                        markNoteCompleted(noteElement);
                        if (extra && extra.sessionId) reportAgentDone(extra.sessionId, 'tech');
                    };

                        // ── Static Clone Engine ──────────────────────────────────────────────
                        // Builds a fully inlined, SVG-free, transition-free off-screen snapshot.
                        // Avoids all html2canvas rendering bugs with flex/z-index/SVG icons.
                        function buildStaticClone() {
                            const W = artboard.offsetWidth;
                            const H = artboard.offsetHeight;
                            const cs = getComputedStyle(artboard);
                            const bgColor = cs.backgroundColor || '#ffffff';
                            const flexDir = cs.flexDirection;
                            const isStack = flexDir === 'column';

                            const wrap = document.createElement('div');
                            wrap.style.cssText = [
                                'position:absolute', 'left:-99999px', 'top:0',
                                `width:${W}px`, `height:${H}px`,
                                `background:${bgColor}`,
                                'overflow:hidden',
                                'display:flex',
                                `flex-direction:${flexDir}`
                            ].join(';');

                            const imgAreaEl   = document.getElementById('banner-img-area');
                            const imgBgEl     = document.getElementById('banner-img-bg');
                            const textAreaEl  = document.getElementById('banner-text-area');
                            const headlineEl  = document.getElementById('banner-headline');
                            const subtextEl   = document.getElementById('banner-subtext');
                            const descEl      = document.getElementById('banner-desc');

                            // Detect "Full Background" (Overlay) mode
                            const isOverlay = imgAreaEl && getComputedStyle(imgAreaEl).position === 'absolute';

                            // ── Image panel ──────────────────────────────────────────────
                            if (imgAreaEl) {
                                const imgW = imgAreaEl.offsetWidth;
                                const imgH = imgAreaEl.offsetHeight;
                                const imgBgImage = imgBgEl ? imgBgEl.style.backgroundImage : '';
                                
                                const imgDiv = document.createElement('div');
                                imgDiv.style.cssText = [
                                    `width:${imgW}px`, `height:${imgH}px`,
                                    'flex-shrink:0', 'overflow:hidden', 'position:relative'
                                ].join(';');
                                
                                if (isOverlay) {
                                    imgDiv.style.position = 'absolute';
                                    imgDiv.style.top = '0';
                                    imgDiv.style.left = '0';
                                    imgDiv.style.zIndex = '1';
                                }

                                if (imgBgImage && imgBgImage !== 'none' && imgBgImage !== '') {
                                    imgDiv.style.backgroundImage = imgBgImage;
                                    imgDiv.style.backgroundSize = 'cover';
                                    imgDiv.style.backgroundPosition = 'center';
                                } else {
                                    imgDiv.style.background = '#ececec';
                                }
                                wrap.appendChild(imgDiv);
                            }

                            // ── Text panel ───────────────────────────────────────────────
                            if (textAreaEl) {
                                const txtW    = textAreaEl.offsetWidth;
                                const txtH    = textAreaEl.offsetHeight;
                                const tcs     = getComputedStyle(textAreaEl);
                                const txtPad  = tcs.padding;
                                const txtBg   = tcs.background || tcs.backgroundColor || 'transparent'; 
                                const txtJust = tcs.justifyContent;

                                const txtDiv = document.createElement('div');
                                txtDiv.style.cssText = [
                                    `width:${txtW}px`, `height:${txtH}px`,
                                    'flex-shrink:0', 'display:flex', 'flex-direction:column',
                                    `justify-content:${txtJust}`, `padding:${txtPad}`,
                                    'box-sizing:border-box', 'overflow:hidden',
                                    'position:relative'
                                ].join(';');

                                // Handle Gradients specifically if present in "background"
                                if (txtBg.includes('gradient')) {
                                    txtDiv.style.background = txtBg;
                                } else {
                                    txtDiv.style.backgroundColor = tcs.backgroundColor;
                                }

                                if (isOverlay) {
                                    txtDiv.style.position = 'absolute';
                                    txtDiv.style.top = '0';
                                    txtDiv.style.left = '0';
                                    txtDiv.style.zIndex = '2';
                                }

                                // Headline
                                if (headlineEl && headlineEl.innerText.trim()) {
                                    const hcs = getComputedStyle(headlineEl);
                                    const h = document.createElement('div');
                                    h.innerText = headlineEl.innerText;
                                    h.style.cssText = [
                                        `font-size:${hcs.fontSize}`, `font-weight:${hcs.fontWeight}`,
                                        `color:${hcs.color}`, `font-family:${hcs.fontFamily}`,
                                        `line-height:${hcs.lineHeight}`, `letter-spacing:${hcs.letterSpacing}`,
                                        'margin:0 0 10px 0', 'white-space:pre-wrap', 'position:relative'
                                    ].join(';');
                                    txtDiv.appendChild(h);
                                }

                                // Subtext
                                if (subtextEl && subtextEl.innerText.trim()) {
                                    const scs = getComputedStyle(subtextEl);
                                    const s = document.createElement('div');
                                    s.innerText = subtextEl.innerText;
                                    s.style.cssText = [
                                        `font-size:${scs.fontSize}`, `font-weight:${scs.fontWeight}`,
                                        `color:${scs.color}`, `font-family:${scs.fontFamily}`,
                                        `line-height:${scs.lineHeight}`, 'margin:0 0 16px 0', 'position:relative'
                                    ].join(';');
                                    txtDiv.appendChild(s);
                                }

                                // Meta row
                                const metaIds = ['artist','venue','date','count','stats'];
                                const metaEls = metaIds.map(id => document.getElementById(`banner-${id}`));
                                
                                if (metaEls.some(el => el && el.innerText.trim())) {
                                    const mcs = getComputedStyle(document.getElementById('banner-meta'));
                                    const mRow = document.createElement('div');
                                    mRow.style.cssText = [
                                        'display:flex', 'flex-wrap:wrap', 'gap:16px', 'align-items:center',
                                        'margin-bottom:12px', `font-size:${mcs.fontSize || '13px'}`,
                                        `font-weight:${mcs.fontWeight}`, `color:${mcs.color}`,
                                        'font-family:sans-serif', 'position:relative'
                                    ].join(';');
                                    
                                    metaEls.forEach(el => {
                                        if (!el || !el.innerText.trim()) return;
                                        
                                        const itemWrap = document.createElement('div');
                                        itemWrap.style.cssText = 'display:flex; align-items:center; gap:6px;';
                                        
                                        // Try to find if there's an icon before this text.
                                        // Lucide replaces <i data-lucide="..."> with <svg> at runtime — check SVG tag.
                                        const icon = el.previousElementSibling;
                                        const isLucideIcon = icon && (
                                            icon.tagName === 'SVG' ||
                                            (icon.tagName === 'I' && icon.getAttribute('data-lucide'))
                                        );
                                        if (isLucideIcon) {
                                            const iconStyle = getComputedStyle(icon);
                                            const iconW = parseInt(iconStyle.width) || 12;
                                            const iconH = parseInt(iconStyle.height) || 12;
                                            const iconColor = iconStyle.color || '#888888';
                                            // Clone and resolve currentColor so SVG serializes correctly for html2canvas
                                            const svgClone = icon.cloneNode(true);
                                            svgClone.setAttribute('width', iconW);
                                            svgClone.setAttribute('height', iconH);
                                            svgClone.setAttribute('stroke', iconColor);
                                            if (!svgClone.getAttribute('xmlns')) svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
                                            const svgStr = new XMLSerializer().serializeToString(svgClone);
                                            const svgDataUrl = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgStr)));
                                            const iconImg = document.createElement('img');
                                            iconImg.src = svgDataUrl;
                                            iconImg.style.cssText = `width:${iconW}px;height:${iconH}px;display:block;flex-shrink:0;`;
                                            itemWrap.appendChild(iconImg);
                                        }

                                        const sp = document.createElement('span');
                                        sp.innerText = el.innerText;
                                        itemWrap.appendChild(sp);
                                        mRow.appendChild(itemWrap);
                                    });
                                    txtDiv.appendChild(mRow);
                                }

                                // Description
                                if (descEl && descEl.innerText.trim()) {
                                    const dcs = getComputedStyle(descEl);
                                    const d = document.createElement('div');
                                    d.innerText = descEl.innerText;
                                    d.style.cssText = [
                                        `font-size:${dcs.fontSize}`, `color:${dcs.color}`,
                                        `font-family:${dcs.fontFamily}`, 'font-style:italic',
                                        `line-height:${dcs.lineHeight}`, 'margin:0',
                                        'padding-top:10px', `border-top:${dcs.borderTop}`,
                                        'position:relative'
                                    ].join(';');
                                    txtDiv.appendChild(d);
                                }

                                wrap.appendChild(txtDiv);
                            }

                            document.body.appendChild(wrap);
                            return wrap;
                        }

                    function doCapture() {
                        if (typeof html2canvas === 'undefined') {
                            const script = document.createElement('script');
                            script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
                            script.onload = doCapture;
                            document.head.appendChild(script);
                            return;
                        }

                        const W = artboard.offsetWidth;
                        const H = artboard.offsetHeight;
                        const staticClone = buildStaticClone();

                        // Flash the live artboard for visual feedback only
                        artboard.style.outline = '3px solid rgba(255,255,255,0.9)';
                        setTimeout(() => { artboard.style.outline = ''; }, 600);

                        html2canvas(staticClone, {
                            useCORS: true,
                            allowTaint: false,
                            backgroundColor: getComputedStyle(artboard).backgroundColor || '#ffffff',
                            scale: 3,
                            logging: false,
                            width: W,
                            height: H
                        }).then(canvas => {
                            document.body.removeChild(staticClone);

                            const handleCanvas = (canvas) => {
                                try {
                                    const link = document.createElement('a');
                                    link.style.display = 'none';
                                    if (isPNG) {
                                        link.download = `curation_export_${Date.now()}.png`;
                                        link.href = canvas.toDataURL('image/png');
                                    } else if (isPDF) {
                                        link.download = `curation_export_${Date.now()}.pdf`;
                                        link.href = canvas.toDataURL('image/jpeg', 0.95);
                                    } else {
                                        link.download = `curation_export_${Date.now()}.jpg`;
                                        link.href = canvas.toDataURL('image/jpeg', 0.95);
                                    }
                                    document.body.appendChild(link);
                                    link.click();
                                    setTimeout(() => { if (link.parentNode) document.body.removeChild(link); }, 100);
                                    showAgentConsoleMessage(`color-${roleShort}`, `✅ ${formatLabel} exported.`, 4000, 20);
                                } catch(e) {
                                    console.error('Export format error:', e);
                                    showAgentConsoleMessage(`color-${roleShort}`, `⚠️ Format failed. Check Console.`, 4000, 20);
                                }
                                finalize();
                            };

                            if (isCopy) {
                                canvas.toBlob(blob => {
                                    const tryClipboard = async () => {
                                        try {
                                            if (!window.ClipboardItem) {
                                                throw new Error("ClipboardItem not supported in this browser");
                                            }
                                            await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
                                            showAgentConsoleMessage(`color-${roleShort}`, `✅ Copied to clipboard!`, 4000, 20);
                                        } catch(err) {
                                            console.warn('Clipboard write failed, downloading instead:', err);
                                            showAgentConsoleMessage(`color-${roleShort}`, `⚠️ Clipboard blocked — downloading PNG instead.`, 5000, 20);
                                            const link = document.createElement('a');
                                            link.download = `curation_clipboard_${Date.now()}.png`;
                                            link.href = canvas.toDataURL('image/png');
                                            document.body.appendChild(link);
                                            link.click();
                                            setTimeout(() => { if (link.parentNode) document.body.removeChild(link); }, 100);
                                        }
                                        finalize();
                                    };
                                    tryClipboard();
                                }, 'image/png');
                            } else {
                                handleCanvas(canvas);
                            }
                        }).catch(err => {
                            if (staticClone.parentNode) document.body.removeChild(staticClone);
                            console.error('Export error:', err);
                            showAgentConsoleMessage(`color-${roleShort}`, `⚠️ Export Error. Check Console.`, 4000, 20);
                            finalize();
                        });
                    }

                    doCapture();
                }, 1000);
            } else {
                // If PM role received a URL, treat as a new exhibition curation request
                const hasUrl = instructions.includes('http://') || instructions.includes('https://');
                if (hasUrl) {
                    showAgentConsoleMessage(`color-${roleShort}`, `PM: Detected new exhibition URL. Re-loading data...`, 3000, 30, '🔄');
                    processTask(instructions, noteElement);
                } else {
                    showAgentConsoleMessage(`color-${roleShort}`, `Received note: ${instructions}`, 2000, 20);
                    setTimeout(() => {
                        if(dot) dot.classList.replace('state-executing', 'state-completed');
                        // Ensure the note is marked completed even for unassigned/unknown roles
                        if (noteElement) markNoteCompleted(noteElement);
                    }, 1000);
                }
            }
        }

        // Testing Mode Initialization
        async function initTestingMode() {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();
                
                if (settings.testing_mode === 1) {
                    console.log("%c[TEST MODE ACTIVE]", "color: #f1a456; font-weight: bold;", settings);
                    
                    // Create a central position for the test note
                    const x = window.innerWidth / 2 - 130;
                    const y = window.innerHeight / 2 - 100;
                    
                    setTimeout(() => {
                        const testContent = `${settings.test_instruction}\n\n${settings.test_url}`;
                        createNewNote(x, y, '#fefefe', 'Unassigned (Chief Curator)', testContent, true);
                    }, 1000);
                }
            } catch (e) {
                console.warn("Could not fetch settings:", e);
            }
        }

        window.addEventListener('load', initTestingMode);

        // --- Live Reload Logic ---
        function startLiveReload() {
            setInterval(async () => {
                try {
                    const res = await fetch('/api/check_updates');
                    const data = await res.json();
                    if (data.updated) {
                        console.log("%c[LIVE RELOAD]%c Modification detected, refreshing...", "color: #f1a456; font-weight:bold;", "color:#555");
                        window.location.reload();
                    }
                } catch (e) {
                    // Fail silently
                }
            }, 2000); // Check every 2 seconds
        }
        startLiveReload();
</script>
</body>
