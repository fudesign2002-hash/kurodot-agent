name: Build & Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  REGION: us-central1
  SERVICE: kurodot-agent

jobs:
  deploy:
    name: Build → Push → Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Authenticate to GCP
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "$GCP_SA_KEY" | base64 --decode > "$RUNNER_TEMP/gcp-key.json"
          gcloud auth activate-service-account --key-file="$RUNNER_TEMP/gcp-key.json"
          gcloud config set project "$GCP_PROJECT_ID"
          gcloud auth configure-docker --quiet

      - name: Build & push Docker image
        shell: bash
        run: |
          BUILD_ID=$(gcloud builds submit \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --timeout=600s \
            --async \
            --format='value(metadata.build.id)')

          echo "Submitted build: $BUILD_ID"

          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project ${{ secrets.GCP_PROJECT_ID }} \
              --format='value(status)')

            echo "Cloud Build status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              break
            fi

            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "INTERNAL_ERROR" ] || [ "$STATUS" = "TIMEOUT" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "EXPIRED" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi

            sleep 10
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/${{ env.SERVICE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --update-env-vars GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --quiet

      - name: Show deployed URL
        run: |
          gcloud run services describe ${{ env.SERVICE }} \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --region ${{ env.REGION }} \
            --format "value(status.url)"
